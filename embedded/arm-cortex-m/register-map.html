<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{

  }

  .sub{font-size:11px;color:#5a8f75;margin-top:6px;letter-spacing:2px}
  .layout{max-width:980px;margin:0 auto;display:grid;grid-template-columns:240px 1fr;gap:16px}
  .grp-lbl{font-size:9px;letter-spacing:2px;color:#5a8f75;margin:12px 0 6px 2px}

  .card{background:#0a1210;border:1px solid rgba(0,255,136,.15);padding:16px;position:relative;margin-bottom:12px}

  .slbl{font-size:9px;color:#5a8f75;letter-spacing:2px;margin-bottom:8px}
  .ft-card{border-color:rgba(255,183,0,.2)!important;background:#0d1108!important}

  .bf-block.selected{filter:brightness(1.7);transform:translateY(-3px);z-index:11;box-shadow:0 4px 12px rgba(0,0,0,.5)}

  .bf-info-name{font-size:15px;font-weight:700;margin-bottom:4px}
  .bf-info-bits{font-size:10px;color:#5a8f75;margin-bottom:8px}
  .bf-info-desc{font-size:12px;color:#c8ffe8;line-height:1.8}
  .bf-info-vals{margin-top:10px;display:flex;flex-direction:column;gap:3px}
  .bf-val-row{font-size:11px;padding:4px 10px;border-left:2px solid;display:flex;gap:12px;align-items:center}
  .bf-val-code{min-width:80px;font-weight:700}
  .bf-val-meaning{color:#c8ffe8}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .detail-text{font-size:12px;color:#c8ffe8;line-height:1.7}
  .example-text{font-size:11px;color:#00ff88;line-height:1.8;white-space:pre-line}
  .sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .sp-box{background:#080e0c;padding:12px}
  .sp-name{font-family:'Orbitron',monospace;font-size:16px;margin-bottom:4px}
  .sp-full{font-size:10px;color:#5a8f75;margin-bottom:8px}
  .sp-item{font-size:11px;color:#c8ffe8;padding:2px 0 3px 8px;margin-bottom:3px}
  .exc-row{display:flex;gap:12px;align-items:center;padding:8px 12px;margin-bottom:4px}
  .exc-val{color:#ff4466;font-weight:700;font-size:12px;min-width:100px}
  .exc-desc{font-size:11px;color:#c8ffe8;flex:1}
  .exc-tag{font-size:9px;color:#00ff88;border:1px solid rgba(0,255,136,.4);padding:2px 6px}
  .sim-inputs{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .sim-lbl{font-size:10px;color:#5a8f75;margin-bottom:4px}
  .sim-input{width:64px;background:#0f1c18;border:1px solid rgba(0,255,136,.2);color:#00ff88;font-family:'Share Tech Mono',monospace;font-size:13px;padding:4px 8px;outline:none}
  .sim-result{font-size:12px;color:#c8ffe8;margin-bottom:10px}
  .sim-big{color:#00ff88;font-weight:700;font-size:15px}
  .sim-hex{color:#5a8f75;font-size:10px;margin-left:8px}
  .flag-boxes{display:flex;gap:8px;flex-wrap:wrap}
  .flag-box{padding:8px 14px;text-align:center;min-width:60px;border:1px solid rgba(0,255,136,.1);background:#0a1210;transition:all .2s}
  .flag-box .fbn{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#3a5f4a}
  .flag-box .fbv{font-size:20px;font-weight:700;color:#3a5f4a}
  .flag-box .fbd{font-size:9px;color:#5a8f75}
  .flag-box.on .fbn,.flag-box.on .fbv{color:var(--fc)}
  .ctx-grid{display:flex;gap:0;overflow-x:auto}
  .ctx-grp{margin-right:16px}
  .ctx-title{margin-bottom:6px;white-space:pre-line;font-size:10px;line-height:1.5}
  .ctx-reg{background:#0a1210;padding:3px 10px;font-size:11px;display:flex;justify-content:space-between;gap:16px;margin-bottom:2px}
  .ctx-offset{font-size:9px;color:#3a5f4a}
  .ctx-note{display:flex;align-items:center;color:#5a8f75;font-size:11px;padding-left:8px;line-height:2}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fadein{animation:fadeIn .2s ease both}
  @media(max-width:700px){.layout{grid-template-columns:1fr}.two-col,.sp-grid{grid-template-columns:1fr}}
</style>
</head>

const GROUPS=[
  {id:"general",label:"R0–R3 · Caller-saved"},
  {id:"saved",  label:"R4–R11 · Callee-saved"},
  {id:"scratch",label:"R12 · Scratch"},
  {id:"special",label:"R13–R15 · Special"},
  {id:"xpsr",  label:"xPSR · Status Register"},
];

let CID="R13", FIDX=0, simA=3, simB=4, simC=2;

function buildLeft(){
  let h='';
  GROUPS.forEach(g=>{
    h+=`<div class="grp-lbl">${g.label}</div><div style="display:flex;flex-direction:column;gap:3px">`;
    R.filter(r=>r.group===g.id).forEach(r=>{
      const a=CID===r.id;
      h+=`<button class="reg-btn${a?' active':''}" style="border-color:${a?r.color+'88':'rgba(0,255,136,.15)'}" onclick="sel('${r.id}')">
        <span class="rname" style="color:${a?r.color:'inherit'}">${r.label}</span>
        <span class="rrole">${r.role.substring(0,24)}${r.role.length>24?'…':''}</span>
      </button>`;
    });
    h+=`</div>`;
  });
  document.getElementById('left-panel').innerHTML=h;
}

function buildRight(){
  const reg=R.find(r=>r.id===CID);
  if(!reg){document.getElementById('right-panel').innerHTML='';return;}
  const fi=FIDX<reg.bf.length?FIDX:0;
  const sf=reg.bf[fi];
  let h='';

  // Title card + bit layout
  h+=`<div class="card fadein" style="border-color:${reg.color}44">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div style="font-family:'Orbitron',monospace;font-size:26px;font-weight:900;color:${reg.color};text-shadow:0 0 20px ${reg.color}66">${reg.label}</div>
      <div>
        <div style="font-size:13px;color:#c8ffe8;margin-bottom:2px">${reg.role}</div>
        <div style="font-size:10px;color:#5a8f75;letter-spacing:1px">32-BIT · ARM CORTEX-M</div>
      </div>
    </div>
    <div class="slbl">// BIT LAYOUT — nhấn ô bit hoặc vùng tên để xem chi tiết</div>
    <div class="bit-scale">`;
  // Number scale
  for(let i=0;i<32;i++){
    const b=31-i;
    h+=`<div class="bit-num">${(b%8===0||b===31)?b:''}</div>`;
  }
  h+=`</div>`;
  // Build bit→field map
  const bitMap={};
  reg.bf.forEach((bf,idx)=>{for(let b=bf.lo;b<=bf.hi;b++) bitMap[b]=idx;});
  // Individual 32 bit cells, colored by field
  h+=`<div class="bit-scale" style="margin-bottom:4px">`;
  for(let i=0;i<32;i++){
    const b=31-i;
    const idx=bitMap[b]??0;
    const bf=reg.bf[idx];
    const sel=idx===fi;
    const isEdge_right=(b===bf.hi); // leftmost cell of the field (rendered first)
    const isEdge_left=(b===bf.lo);  // rightmost cell
    h+=`<div onclick="selF(${idx})"
      title="bit ${b} — ${bf.name}"
      style="
        min-width:20px;height:28px;flex-shrink:0;cursor:pointer;
        background:${bf.color}${sel?'30':'16'};
        border-top:1px solid ${bf.color}${sel?'cc':'55'};
        border-bottom:1px solid ${bf.color}${sel?'cc':'55'};
        border-left:${isEdge_right?`2px solid ${bf.color}${sel?'ff':'88'}`:'1px solid transparent'};
        border-right:${isEdge_left?`2px solid ${bf.color}${sel?'ff':'88'}`:'1px solid transparent'};
        display:flex;align-items:center;justify-content:center;
        font-size:8px;color:${bf.color}${sel?'dd':'77'};
        transition:filter .1s,transform .1s;
        ${sel?`box-shadow:0 0 6px ${bf.color}44;transform:translateY(-1px);`:''}
      "
      onmouseover="this.style.filter='brightness(1.6)';this.style.transform='translateY(-2px)'"
      onmouseout="this.style.filter='';this.style.transform='${sel?'translateY(-1px)':''}'"
    >${b===bf.hi&&(bf.hi-bf.lo)>=3?'<span style=font-size:7px>'+b+'</span>':b===bf.lo&&(bf.hi-bf.lo)>=3?'<span style=font-size:7px>'+b+'</span>':''}</div>`;
  }
  h+=`</div>`;
  // Field name blocks as legend below
  h+=`<div class="bf-row" style="margin-top:2px">`;
  reg.bf.forEach((bf,idx)=>{
    const w=bf.hi-bf.lo+1;
    const bw=w*20+(w-1)*2;
    const sel=idx===fi;
    h+=`<div class="bf-block${sel?' selected':''}"
      style="width:${bw}px;background:${bf.color}${sel?'22':'0e'};border-color:${bf.color}${sel?'99':'33'};color:${bf.color}${sel?'ff':'99'};font-size:8px;height:20px;"
      onclick="selF(${idx})">
      ${w>=4?`<span style="overflow:hidden;max-width:${bw-6}px;display:inline-block;white-space:nowrap">${bf.name}</span>`:''}
    </div>`;
  });
  h+=`</div>`;

  // Selected field info
  h+=`<div class="bf-info" style="border-color:${sf.color}55;background:#080e0c">
    <div class="bf-info-name" style="color:${sf.color}">${sf.name}</div>
    <div class="bf-info-bits">Bit ${sf.hi}${sf.hi!==sf.lo?'–'+sf.lo:''} &nbsp;·&nbsp; ${sf.hi-sf.lo+1} bit${sf.hi!==sf.lo?'s':''}</div>
    <div class="bf-info-desc">${sf.desc.replace(/\n/g,'<br>')}</div>`;
  if(sf.vals&&sf.vals.length){
    h+=`<div class="bf-info-vals">`;
    sf.vals.forEach(v=>{
      h+=`<div class="bf-val-row" style="border-color:${sf.color}66;background:${sf.color}0d">
        <span class="bf-val-code" style="color:${sf.color}">${v.code}</span>
        <span class="bf-val-meaning">${v.m}</span>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div></div>`;

  // Two col
  h+=`<div class="two-col">
    <div class="card fadein">
      <div class="slbl">// MÔ TẢ</div>
      <div class="detail-text">${reg.detail}</div>
    </div>
    <div class="card fadein">
      <div class="slbl">// VÍ DỤ</div>
      <div class="example-text">${reg.example}</div>
    </div>
  </div>`;

  // FreeRTOS
  h+=`<div class="card ft-card fadein">
    <div class="slbl ft-lbl">// FREERTOS CONNECTION</div>
    <div class="detail-text">${reg.freertos}</div>
  </div>`;

  // SP special
  if(reg.special==='sp'){
    h+=`<div class="card fadein" style="border-color:#ff446633;margin-bottom:12px">
      <div class="slbl" style="color:#ff4466">// HAI STACK POINTER VẬT LÝ</div>
      <div class="sp-grid">`;
    [{name:"MSP",full:"Main Stack Pointer",color:"#ffb700",items:["Boot / startup code","Exception handlers","FreeRTOS kernel (PendSV)"]},
     {name:"PSP",full:"Process Stack Pointer",color:"#00ff88",items:["Task A stack","Task B stack","Task C stack ← FreeRTOS switch PSP!"]}
    ].forEach(sp=>{
      h+=`<div class="sp-box" style="border:1px solid ${sp.color}33">
        <div class="sp-name" style="color:${sp.color}">${sp.name}</div>
        <div class="sp-full">${sp.full}</div>`;
      sp.items.forEach(it=>h+=`<div class="sp-item" style="border-left:2px solid ${sp.color}55">${it}</div>`);
      h+=`</div>`;
    });
    h+=`</div></div>`;
  }

  // LR special
  if(reg.special==='lr'){
    h+=`<div class="card fadein" style="border-color:#ff446633;margin-bottom:12px">
      <div class="slbl" style="color:#ff4466">// EXC_RETURN VALUES</div>`;
    [{val:"0xFFFFFFF1",desc:"Return to Handler mode, MSP",ft:false},
     {val:"0xFFFFFFF9",desc:"Return to Thread mode, MSP",ft:false},
     {val:"0xFFFFFFFD",desc:"Return to Thread mode, PSP ← FreeRTOS tasks",ft:true},
    ].forEach(e=>{
      h+=`<div class="exc-row" style="background:${e.ft?'#0a1a0a':'#0a100e'};border:1px solid ${e.ft?'#00ff8833':'rgba(0,255,136,.08)'}">
        <span class="exc-val">${e.val}</span><span class="exc-desc">${e.desc}</span>
        ${e.ft?'<span class="exc-tag">FreeRTOS</span>':''}
      </div>`;
    });
    h+=`</div>`;
  }

  // xPSR simulator
  if(reg.special==='xpsr'){
    const res=(simA+simB)*simC;
    const N=res<0?1:0, Z=res===0?1:0, C=(simA+simB)>0xFFFFFFFF?1:0;
    const hex=(res>>>0).toString(16).toUpperCase().padStart(8,'0');
    h+=`<div class="card fadein" style="border-color:#cc88ff33;margin-bottom:12px">
      <div class="slbl" style="color:#cc88ff">// FLAG SIMULATOR — (a + b) × c</div>
      <div class="sim-inputs">`;
    ['a','b','c'].forEach((k,i)=>{
      h+=`<div><div class="sim-lbl">${k} =</div>
        <input class="sim-input" type="number" value="${[simA,simB,simC][i]}" onchange="updSim('${k}',this.value)">
      </div>`;
    });
    h+=`</div><div class="sim-result">R0 = (${simA} + ${simB}) × ${simC} = <span class="sim-big">${res}</span><span class="sim-hex">(0x${hex})</span></div>
      <div class="flag-boxes">`;
    [{flag:"N",val:N,desc:"Negative",color:"#ff4466"},
     {flag:"Z",val:Z,desc:"Zero",color:"#00ff88"},
     {flag:"C",val:C,desc:"Carry",color:"#ffb700"},
     {flag:"V",val:0,desc:"Overflow",color:"#00aaff"},
    ].forEach(f=>{
      h+=`<div class="flag-box${f.val?' on':''}" style="--fc:${f.color};${f.val?`background:${f.color}22;border-color:${f.color}`:''}">
        <div class="fbn">${f.flag}</div><div class="fbv">${f.val}</div><div class="fbd">${f.desc}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  // Context switch — always
  h+=`<div class="card ft-card fadein">
    <div class="slbl ft-lbl">// FREERTOS CONTEXT SWITCH — REGISTERS ĐƯỢC LƯU NHƯ THẾ NÀO</div>
    <div class="ctx-grid">`;
  [{label:"AUTO-PUSH\n(CPU hardware)",regs:["xPSR","PC","LR","R12","R3","R2","R1","R0"],color:"#ff4466"},
   {label:"MANUAL-PUSH\n(FreeRTOS PendSV)",regs:["R11","R10","R9","R8","R7","R6","R5","R4"],color:"#00aaff"},
  ].forEach(g=>{
    h+=`<div class="ctx-grp"><div class="ctx-title" style="color:${g.color}">${g.label}</div>`;
    g.regs.forEach((r,i)=>h+=`<div class="ctx-reg" style="border:1px solid ${g.color}33;color:${g.color}"><span>${r}</span><span class="ctx-offset">SP-${(g.regs.length-i)*4}</span></div>`);
    h+=`</div>`;
  });
  h+=`<div class="ctx-note">← Lưu PSP Task A<br>vào TCB<br><br>Nạp PSP Task B<br>từ TCB →<br><br><span style="color:#00ff88">Task B tiếp tục!</span></div>
    </div></div>`;

  document.getElementById('right-panel').innerHTML=h;
}

function sel(id){CID=id;FIDX=0;buildLeft();buildRight();}
function selF(i){FIDX=i;buildRight();}
function updSim(k,v){const n=parseInt(v)||0;if(k==='a')simA=n;if(k==='b')simB=n;if(k==='c')simC=n;buildRight();}

buildLeft();buildRight();
</script>
</body>
</html>
